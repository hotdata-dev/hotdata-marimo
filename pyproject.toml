[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[project]
name = "hotdata-marimo"
version = "0.1.0"
description = "Marimo UI for Hotdata (built on hotdata-core-notebook)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
  "hotdata-core-notebook @ git+https://github.com/hotdata-dev/hotdata-notebook-core.git@feat/workspace-health",
  "marimo>=0.10.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.marimo.runtime]
# Reduces stale cell state when opening the example; overrides personal marimo.toml if unset.
auto_instantiate = true

